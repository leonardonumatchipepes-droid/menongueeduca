<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Biblioteca Digital</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
overflow-x:hidden;
}

/* SIDEBAR */

.sidebar{
width:250px;
height:100vh;
background:
linear-gradient(rgba(0,0,0,0.8),rgba(0,0,0,0.8)),
url("imagens/vunongue.png");
background-size:cover;
position:fixed;
padding:20px;
}

.sidebar h3{
text-align:center;
margin-bottom:20px;
}

.sidebar button{
width:100%;
margin-bottom:10px;
}

/* AREA DIREITA */

.main{
margin-left:250px;
padding:25px;
}

/* BIBLIOTECA HORIZONTAL */

.livros{
display:flex;
gap:15px;
overflow-x:auto;
padding-bottom:10px;
}

.livro{
min-width:200px;
background:#1b1b1b;
padding:20px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
text-align:center;
}

.livro:hover{
background:#2a2a2a;
transform:translateY(-5px);
}

/* VISUALIZADOR PDF */

.viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
flex-direction:column;
z-index:999;
}

.viewer-header{
background:#111;
padding:10px;
display:flex;
justify-content:space-between;
}

.viewer iframe{
flex:1;
width:100%;
border:none;
}

/* RESPONSIVO */

@media(max-width:768px){

.sidebar{
position:relative;
width:100%;
height:auto;
}

.main{
margin-left:0;
}

}

</style>
</head>

<body>

<!-- SIDEBAR CLASSES -->

<div class="sidebar">

<h3>Biblioteca Digital</h3>

<button class="btn btn-outline-light" onclick="abrirClasse(1)">1ª Classe</button>
<button class="btn btn-outline-light" onclick="abrirClasse(2)">2ª Classe</button>
<button class="btn btn-outline-light" onclick="abrirClasse(3)">3ª Classe</button>
<button class="btn btn-outline-light" onclick="abrirClasse(4)">4ª Classe</button>
<button class="btn btn-outline-light" onclick="abrirClasse(5)">5ª Classe</button>
<button class="btn btn-outline-light" onclick="abrirClasse(6)">6ª Classe</button>

</div>

<!-- BIBLIOTECA -->

<div class="main">

<h3 id="tituloClasse">Escolha uma classe</h3>

<div class="livros" id="livros"></div>

</div>

<!-- VISUALIZADOR PDF -->

<div class="viewer" id="viewer">

<div class="viewer-header">

<button class="btn btn-light" onclick="fecharLivro()">Voltar</button>

<a id="downloadBtn" class="btn btn-success" download>Baixar PDF</a>

</div>

<iframe id="pdfFrame"></iframe>

</div>

<script>

/* DISCIPLINAS */

const disciplinas = [

{nome:"Matemática", codigo:"mat"},
{nome:"Língua Portuguesa", codigo:"lp"},
{nome:"Estudo do Meio", codigo:"edm"},
{nome:"Educação Física", codigo:"ef"},
{nome:"Educação Manual e Plástica", codigo:"emp"},
{nome:"Educação Moral e Cívica", codigo:"emc"},
{nome:"Ciências da Natureza", codigo:"cn"},
{nome:"Geografia", codigo:"geo"},
{nome:"História", codigo:"hist"}

];

/* ABRIR CLASSE */

function abrirClasse(classe){

document.getElementById("tituloClasse").innerText = classe + "ª Classe";

const livros = document.getElementById("livros");

livros.innerHTML="";

disciplinas.forEach(disciplina=>{

let arquivo = disciplina.codigo + "_" + classe + ".pdf";

let card = document.createElement("div");

card.className="livro";

card.innerHTML=`

<h5>${disciplina.nome}</h5>

<small>${arquivo}</small>

`;

card.onclick=()=>abrirLivro(arquivo);

livros.appendChild(card);

});

}

/* ABRIR LIVRO */

function abrirLivro(arquivo){

let caminho="pdfs/"+arquivo;

/* MOBILE */

if(/Android|iPhone|iPad/i.test(navigator.userAgent)){

window.open(caminho,"_blank");

return;

}

document.getElementById("pdfFrame").src=caminho;

document.getElementById("downloadBtn").href=caminho;

document.getElementById("viewer").style.display="flex";

}

/* FECHAR LIVRO */

function fecharLivro(){

document.getElementById("viewer").style.display="none";

document.getElementById("pdfFrame").src="";

}

</script>

</body>
</html>
