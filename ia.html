<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VUNONGUE IA • </title>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.10.142/pdf.min.js"></script>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial,sans-serif; display:flex; flex-direction:column; height:100vh; margin:0; }
header { background:#0b3d91; color:white; padding:15px; text-align:center; display:flex; justify-content:center; align-items:center; gap:15px; }
header img { width:40px; border-radius:50%; }
.main { display:flex; flex:1; overflow:hidden; }
.sidebar { width:260px; background:#0b3d91; color:white; padding:15px; border-right:2px solid #f59e0b; display:flex; flex-direction:column; }
.sidebar h3 { text-align:center; margin-bottom:15px; }
.sidebar ul { list-style:none; padding:0; flex:1; overflow-y:auto; }
.sidebar li { padding:10px; cursor:pointer; margin-bottom:5px; border-radius:6px; }
.sidebar li:hover { background: rgba(255,255,255,0.2); }
.sidebar button { margin-top:10px; padding:10px; border:none; border-radius:6px; cursor:pointer; font-weight:bold; background:#f59e0b; }
.sidebar button:hover { background:#d97706; }
.chat-container { flex:1; display:flex; flex-direction:column; background:#f8f8f8; margin:10px; border-radius:12px; overflow:hidden; }
.messages { flex:1; overflow-y:auto; padding:15px; }
.message { margin-bottom:12px; display:flex; }
.user { justify-content:flex-end; }
.bot { justify-content:flex-start; }
.bubble { max-width:70%; padding:12px 16px; border-radius:15px; word-wrap:break-word; }
.user .bubble { background:#0b3d91; color:white; border-bottom-right-radius:0; }
.bot .bubble { background:#e9e9e9; color:#333; border-bottom-left-radius:0; }
.input-area { display:flex; border-top:1px solid #ccc; }
input { flex:1; padding:12px; font-size:16px; border:none; outline:none; }
button.send-btn { padding:12px; background:#f59e0b; border:none; cursor:pointer; font-weight:bold; }
button.send-btn:hover { background:#d97706; }
.embedded { width:100%; margin-top:10px; border-radius:6px; }
.sugestoes { background:#f3f3f3; padding:10px; font-size:13px; border-top:1px solid #ddd; display:flex; flex-wrap:wrap; gap:8px; }
.sugestoes span { cursor:pointer; color:#0b3d91; background:#e0e7ff; padding:5px 8px; border-radius:5px; transition: all 0.2s; }
.sugestoes span:hover { background:#c7d2fe; }
.footer { text-align:center; font-size:12px; padding:6px; background:#0b3d91; color:white; box-shadow:0 -3px 10px rgba(0,0,0,0.2); }
@media(max-width:768px){ .main { flex-direction:column; } .sidebar{width:100%; flex-direction:row; overflow-x:auto;} .sidebar ul{display:flex; gap:10px;} .sidebar li{border:none;} }
</style>
</head>

<body>

<header>
<img src="imagens/insignia.png" alt="Insígnia Angola">
<h1>VUNONGUE IA • </h1>
<img src="imagens/logo01.png" alt="Logo Menongue Educa">
</header>

<div class="main">

<div class="sidebar">
<h3>Biblioteca por Ano</h3>
<select id="anoSelect" onchange="mostrarLivros()">
  <option value="1">1º Ano</option>
  <option value="2">2º Ano</option>
  <option value="3">3º Ano</option>
  <option value="4">4º Ano</option>
  <option value="5">5º Ano</option>
  <option value="6">6º Ano</option>
</select>
<ul id="listaLivros"></ul>
<button onclick="window.location.href='index.html'">⬅ Voltar</button>
<button onclick="window.location.href='estudo.html'">📚 Estude Aqui</button>
</div>

<div class="chat-container">
<div class="messages" id="messages">
<div class="message bot"><div class="bubble">
Olá 👋<br>
Sou a IA <b>VUNONGUE</b>!<br>
Clique em um livro para abrir PDF, gerar resumo e exercícios automáticos.
</div></div>
</div>

<div class="sugestoes">
Sugestões rápidas:
<span onclick="perguntar('Explique Matemática')">Matemática</span>
<span onclick="perguntar('O que é um verbo?')">Português</span>
<span onclick="perguntar('Cite fatos históricos')">História</span>
<span onclick="perguntar('Elementos de Ciências')">Ciências</span>
</div>

<div class="input-area">
<input id="input" placeholder="Digite sua pergunta...">
<button class="send-btn" onclick="send()">Enviar</button>
</div>
</div>

</div>

<div class="footer">
Menongue Educa • Assistente Educativo Inteligente
</div>

<script>
// ================= BASE DE LIVROS =================
const livros = {
1:[{nome:"Matemática",file:"pdfs/mat_1.pdf"},{nome:"Língua Portuguesa",file:"pdfs/lp_1.pdf"},{nome:"Estudo do Meio",file:"pdfs/edm_1.pdf"},{nome:"Educação Física",file:"pdfs/ef_1.pdf"},{nome:"Educação Manual",file:"pdfs/emp_1.pdf"}],
2:[{nome:"Matemática",file:"pdfs/mat_2.pdf"},{nome:"Língua Portuguesa",file:"pdfs/lp_2.pdf"},{nome:"Estudo do Meio",file:"pdfs/edm_2.pdf"},{nome:"Educação Física",file:"pdfs/ef_2.pdf"},{nome:"Educação Manual",file:"pdfs/emp_2.pdf"}],
3:[{nome:"Matemática",file:"pdfs/mat_3.pdf"},{nome:"Língua Portuguesa",file:"pdfs/lp_3.pdf"},{nome:"Estudo do Meio",file:"pdfs/edm_3.pdf"},{nome:"Educação Física",file:"pdfs/ef_3.pdf"},{nome:"Educação Manual",file:"pdfs/emp_3.pdf"}],
4:[{nome:"Matemática",file:"pdfs/mat_4.pdf"},{nome:"Língua Portuguesa",file:"pdfs/lp_4.pdf"},{nome:"Estudo do Meio",file:"pdfs/edm_4.pdf"},{nome:"Educação Física",file:"pdfs/ef_4.pdf"},{nome:"Educação Manual",file:"pdfs/emp_4.pdf"}],
5:[{nome:"Matemática",file:"pdfs/mat_5.pdf"},{nome:"Língua Portuguesa",file:"pdfs/lp_5.pdf"},{nome:"Ciências",file:"pdfs/cn_5.pdf"},{nome:"Geografia",file:"pdfs/geo_5.pdf"},{nome:"História",file:"pdfs/hist_5.pdf"},{nome:"Educação Moral",file:"pdfs/emc_5.pdf"}],
6:[{nome:"Matemática",file:"pdfs/mat_6.pdf"},{nome:"Língua Portuguesa",file:"pdfs/lp_6.pdf"},{nome:"Ciências",file:"pdfs/cn_6.pdf"},{nome:"Geografia",file:"pdfs/geo_6.pdf"},{nome:"História",file:"pdfs/hist_6.pdf"},{nome:"Educação Moral",file:"pdfs/emc_6.pdf"}]
}

// ================= MOSTRAR LIVROS =================
function mostrarLivros(){
  const ano = document.getElementById('anoSelect').value;
  const lista = document.getElementById('listaLivros');
  lista.innerHTML = '';
  livros[ano].forEach((l,i)=>{
    const li = document.createElement('li');
    li.textContent = l.nome;
    li.onclick = ()=>abrirPDF(l.file,l.nome);
    lista.appendChild(li);
  });
}
mostrarLivros();

// ================= CHAT =================
const messages = document.getElementById('messages');

function addMessage(text,type='bot'){
    const div = document.createElement('div');
    div.className = 'message ' + type;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = text;
    div.appendChild(bubble);
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    if(type==='bot'){ const utter = new SpeechSynthesisUtterance(text.replace(/<br>/g,'. ')); window.speechSynthesis.speak(utter);}
}

function perguntar(text){ document.getElementById('input').value=text; send(); }

function send(){
    const input = document.getElementById('input').value.trim();
    if(!input) return;
    addMessage(input,'user');
    document.getElementById('input').value='';
    addMessage(`Processando pergunta: <b>${input}</b>. Consultando livros da biblioteca...`);
}

// ================= PDF INTERATIVO =================
async function abrirPDF(file,name){
    addMessage(`Abrindo PDF de <b>${name}</b>...`);
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.10.142/pdf.worker.min.js';
    const loadingTask = pdfjsLib.getDocument(file);
    const pdf = await loadingTask.promise;
    let textoTotal = '';
    for(let i=1;i<=pdf.numPages;i++){
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        const strings = content.items.map(item => item.str);
        textoTotal += strings.join(' ') + '\n';
    }
    gerarResumo(textoTotal,name);
    gerarExercicios(textoTotal,name);
}

// ================= RESUMO =================
function gerarResumo(texto,name){
    const resumo = texto.split('.').slice(0,5).join('. ') + '.';
    addMessage(`<b>Resumo de ${name}:</b><br>${resumo}`);
}

// ================= EXERCÍCIOS =================
function gerarExercicios(texto,name){
    const linhas = texto.split('.').filter(s => s.length>10);
    const exercicios = linhas.slice(0,3).map((l,i)=>`Questão ${i+1}: ${l.replace(/[0-9]/g,'____')}`);
    addMessage(`<b>Exercícios de ${name}:</b><br>${exercicios.join('<br>')}`);
}
</script>

</body>
</html>
