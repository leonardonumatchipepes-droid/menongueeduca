<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corrida Educativa Menongue</title>

<style>

body{
margin:0;
font-family:Arial;
overflow:hidden;
background:#111;
color:white;
text-align:center;
}

header{
background:#0d47a1;
padding:10px;
display:flex;
align-items:center;
gap:10px;
}

header img{
height:40px;
}

#gameCanvas{
display:block;
margin:auto;
background:#333;
border-radius:12px;
}

#telaInicial{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(#0d47a1,#1976d2);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

#telaInicial h1{
font-size:38px;
margin-bottom:20px;
}

#btnStart{
padding:15px 40px;
font-size:20px;
background:#FFD700;
border:none;
border-radius:12px;
cursor:pointer;
}

#pergunta{
position:absolute;
top:60px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.8);
padding:12px 30px;
border-radius:15px;
font-size:26px;
color:#FFD700;
}

</style>
</head>

<body>

<header>
<img src="imagens/logo.png">
Corrida Educativa Menongue
</header>

<div id="telaInicial">

<h1>🏁 Consegues correr e aprender?</h1>

<button id="btnStart" onclick="iniciar()">Iniciar Corrida</button>

</div>

<canvas id="gameCanvas" width="800" height="500"></canvas>

<div id="pergunta">Prepare-se...</div>

<script src="dados/BancoPerguntasMatematica.js"></script>

<script>

const canvas = document.getElementById("gameCanvas")
const ctx = canvas.getContext("2d")

let largura = canvas.width
let altura = canvas.height

/* ESTRADA */

let estradaY = 0

/* CARRO */

let carro = {

x:350,
y:400,
faixa:1

}

let faixas = [150,350,550]

/* JOGO */

let velocidade = 3
let pontos = 0
let moedas = []
let baloes = []
let particulas = []

let jogo = false

/* PERGUNTAS */

let perguntas = window.BancoPerguntasMatematica
let perguntaAtual

/* SOM */

let musica = new Audio("sons/musica.mp3")
musica.loop = true

/* INICIAR */

function iniciar(){

document.getElementById("telaInicial").style.display="none"

jogo = true

gerarPergunta()

gerarMoedas()

musica.play()

requestAnimationFrame(loop)

}

/* GERAR PERGUNTA */

function gerarPergunta(){

perguntaAtual = perguntas[Math.floor(Math.random()*perguntas.length)]

document.getElementById("pergunta").innerText = perguntaAtual.pergunta

baloes=[]

let ordem=[0,1,2].sort(()=>Math.random()-0.5)

for(let i=0;i<3;i++){

baloes.push({

x:faixas[ordem[i]],
y:-100,
texto:perguntaAtual.opcoes[i],
correta:i===perguntaAtual.correta

})

}

}

/* MOEDAS */

function gerarMoedas(){

for(let i=0;i<3;i++){

moedas.push({

x:faixas[i],
y:-Math.random()*600

})

}

}

/* CONTROLES */

document.addEventListener("keydown",(e)=>{

if(e.key==="ArrowLeft" && carro.faixa>0){

carro.faixa--
carro.x = faixas[carro.faixa]

}

if(e.key==="ArrowRight" && carro.faixa<2){

carro.faixa++
carro.x = faixas[carro.faixa]

}

})

/* CONTROLE CELULAR */

canvas.addEventListener("touchstart",(e)=>{

let toque = e.touches[0].clientX

if(toque < window.innerWidth/2){

if(carro.faixa>0){

carro.faixa--
carro.x = faixas[carro.faixa]

}

}else{

if(carro.faixa<2){

carro.faixa++
carro.x = faixas[carro.faixa]

}

}

})

/* LOOP */

function loop(){

if(!jogo)return

ctx.clearRect(0,0,largura,altura)

/* DESENHAR ESTRADA */

ctx.fillStyle="#555"
ctx.fillRect(250,0,300,altura)

ctx.strokeStyle="white"
ctx.lineWidth=5

for(let i=0;i<altura;i+=40){

ctx.beginPath()
ctx.moveTo(400, i+estradaY)
ctx.lineTo(400, i+20+estradaY)
ctx.stroke()

}

estradaY+=velocidade

if(estradaY>40) estradaY=0

/* CARRO */

ctx.font="50px Arial"
ctx.fillText("🚗", carro.x, carro.y)

/* MOEDAS */

moedas.forEach(m=>{

m.y+=velocidade

ctx.font="30px Arial"
ctx.fillText("💰", m.x+20, m.y)

if(

carro.x < m.x+50 &&
carro.x+50 > m.x &&
carro.y < m.y+50 &&
carro.y+50 > m.y

){

pontos++

criarBrilho(m.x,m.y)

m.y=-200

}

})

/* BALÕES */

baloes.forEach(b=>{

b.y+=velocidade

ctx.fillStyle="#FFA500"
ctx.fillRect(b.x,b.y,140,60)

ctx.fillStyle="black"
ctx.fillText(b.texto,b.x+20,b.y+35)

if(

carro.x < b.x+140 &&
carro.x+60 > b.x &&
carro.y < b.y+60 &&
carro.y+60 > b.y

){

if(b.correta){

pontos+=2

criarBrilho(carro.x,carro.y)

}else{

explosao(carro.x,carro.y)

}

gerarPergunta()

}

})

/* PARTICULAS */

particulas.forEach((p,i)=>{

ctx.fillStyle=p.cor
ctx.beginPath()
ctx.arc(p.x,p.y,5,0,Math.PI*2)
ctx.fill()

p.y+=p.vy
p.alpha-=0.03

if(p.alpha<=0) particulas.splice(i,1)

})

/* HUD */

ctx.fillStyle="white"
ctx.font="20px Arial"
ctx.fillText("Pontos: "+pontos,20,30)

/* VELOCIDADE */

if(velocidade<10) velocidade+=0.002

requestAnimationFrame(loop)

}

/* EFEITOS */

function criarBrilho(x,y){

for(let i=0;i<10;i++){

particulas.push({

x:x,
y:y,
vy:-Math.random()*2,
cor:"yellow",
alpha:1

})

}

}

function explosao(x,y){

for(let i=0;i<15;i++){

particulas.push({

x:x,
y:y,
vy:Math.random()*3,
cor:"red",
alpha:1

})

}

}

</script>

</body>
</html>
