<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corrida Menongue - Quiz Educativo</title>

<style>

body{
margin:0;
font-family:Poppins,sans-serif;
overflow:hidden;
background:#0d47a1;
color:white;
}

header{
background:#0d47a1;
color:white;
padding:10px;
display:flex;
align-items:center;
gap:10px;
}

header img{
height:40px;
}

#gameCanvas{
display:block;
margin:auto;
border-radius:12px;
background:#333;
}

#btnIniciar{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:12px 25px;
background:#FFD700;
color:#0d47a1;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
font-size:18px;
}

#telaInicial{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:url('imagens/ADM.png') no-repeat center center/cover;
z-index:20;
text-align:center;
}

#telaInicial h1{
font-size:40px;
margin-bottom:20px;
text-shadow:2px 2px 6px black;
}

.medalhas{
display:flex;
gap:20px;
margin-bottom:30px;
}

.medalhas img{
width:80px;
}

#perguntaCentral{
position:absolute;
top:50px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.7);
color:#FFD700;
font-size:28px;
font-weight:bold;
padding:15px 30px;
border-radius:20px;
text-align:center;
text-shadow:2px 2px 5px black;
z-index:5;
}

footer{
margin-top:10px;
font-size:13px;
color:#fff;
text-align:center;
}

</style>
</head>

<body>

<header>
<img src="imagens/logo.png">
Corrida Menongue - Quiz Educativo
</header>

<div id="telaInicial">

<h1>Você consegue correr por Menongue e ainda acertar perguntas?</h1>

<div class="medalhas">
<img src="imagens/medalha_bronze.png">
<img src="imagens/medalha_prata.png">
<img src="imagens/medalha_ouro.png">
</div>

<button id="btnIniciar" onclick="começarCorrida()">▶ Iniciar Corrida</button>

</div>

<canvas id="gameCanvas" width="800" height="500"></canvas>

<div id="perguntaCentral">_</div>

<footer>
Administração Municipal de Menongue | Direção Municipal da Educação
</footer>

<script src="dados/BancoPerguntasMatematica.js"></script>

<script>

const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

let width=canvas.width;
let height=canvas.height;

const fundoImg=new Image();
fundoImg.src="imagens/menonguestreet.png";

let fundoY=0;

const jogadorSprite=new Image();
jogadorSprite.src="imagens/jogador.png";

const somAcerto=new Audio("sons/acerto.mp3");
const somErro=new Audio("sons/erro.mp3");
const somPulo=new Audio("sons/pulo.mp3");
const somCorrida=new Audio("sons/corrida.mp3");

somCorrida.loop=true;
somCorrida.volume=0.2;

const musicaFundo=new Audio("sons/musica.mp3");
musicaFundo.loop=true;
musicaFundo.volume=0.25;

const faixasX=[150,350,550];

let jogador={
x:faixasX[1],
y:380,
largura:70,
altura:70,
faixa:1,
vidas:3,
yOffset:0
};

let perguntas=window.BancoPerguntasMatematica;

let perguntaAtual;
let baloes=[];
let moedas=[];
let particulas=[];

let pontos=0;
let velocidadeBaloes=2;
let jogoAtivo=false;

function começarCorrida(){

document.getElementById("telaInicial").style.display="none";

iniciarJogo();

}

function iniciarJogo(){

pontos=0;
jogador.vidas=3;
jogoAtivo=true;
baloes=[];
moedas=[];

gerarMoedas();
gerarPergunta();

document.addEventListener("keydown",moverJogador);
document.addEventListener("touchstart",touchControle);

somCorrida.play();
musicaFundo.play();

requestAnimationFrame(loop);

}

function gerarPergunta(){

perguntaAtual=perguntas[Math.floor(Math.random()*perguntas.length)];

baloes=[];

let indices=[0,1,2].sort(()=>Math.random()-0.5);

for(let i=0;i<3;i++){

baloes.push({

x:faixasX[indices[i]],
y:-100,
largura:140,
altura:60,
texto:perguntaAtual.opcoes[i],
correta:i===perguntaAtual.correta

});

}

document.getElementById("perguntaCentral").innerText=perguntaAtual.pergunta;

}

function gerarMoedas(){

for(let i=0;i<3;i++){

moedas.push({

x:faixasX[i],
y:-Math.random()*600

});

}

}

function moverJogador(e){

if(!jogoAtivo) return;

if(e.key==="ArrowLeft" && jogador.faixa>0){

jogador.faixa--;
jogador.x=faixasX[jogador.faixa];

}

if(e.key==="ArrowRight" && jogador.faixa<2){

jogador.faixa++;
jogador.x=faixasX[jogador.faixa];

}

}

function touchControle(e){

let touchX=e.touches[0].clientX;

if(touchX<window.innerWidth/2 && jogador.faixa>0){

jogador.faixa--;
jogador.x=faixasX[jogador.faixa];

}

else if(touchX>=window.innerWidth/2 && jogador.faixa<2){

jogador.faixa++;
jogador.x=faixasX[jogador.faixa];

}

}

function desenharJogador(){

ctx.drawImage(jogadorSprite,jogador.x,jogador.y,jogador.largura,jogador.altura);

}

function criarParticula(x,y){

particulas.push({

x:x,
y:y,
r:Math.random()*5+2,
vy:Math.random()*3+1,
alpha:1

});

}

function loop(){

if(!jogoAtivo) return;

fundoY+=velocidadeBaloes;

if(fundoY>=canvas.height) fundoY=0;

ctx.drawImage(fundoImg,0,fundoY,width,height);
ctx.drawImage(fundoImg,0,fundoY-height,width,height);

ctx.fillStyle="white";
ctx.font="18px Arial";
ctx.fillText("Pontos: "+pontos,20,30);
ctx.fillText("Vidas: "+jogador.vidas,150,30);

desenharJogador();

baloes.forEach((b,i)=>{

b.y+=velocidadeBaloes;

ctx.fillStyle="orange";
ctx.fillRect(b.x,b.y,b.largura,b.altura);

ctx.fillStyle="black";
ctx.fillText(b.texto,b.x+20,b.y+35);

if(

jogador.x<b.x+b.largura &&
jogador.x+jogador.largura>b.x &&
jogador.y<b.y+b.altura &&
jogador.y+jogador.altura>b.y

){

if(b.correta){

pontos++;
somAcerto.play();

for(let j=0;j<10;j++){

criarParticula(jogador.x+35,jogador.y);

}

}

else{

jogador.vidas--;
somErro.play();

if(jogador.vidas<=0){

finalizarCorrida();

return;

}

}

gerarPergunta();

}

});

moedas.forEach((m,i)=>{

m.y+=velocidadeBaloes;

ctx.font="30px Arial";
ctx.fillText("💰",m.x+20,m.y);

if(

jogador.x<m.x+40 &&
jogador.x+jogador.largura>m.x &&
jogador.y<m.y+40 &&
jogador.y+jogador.altura>m.y

){

pontos+=2;

for(let j=0;j<12;j++){

criarParticula(m.x,m.y);

}

m.y=-200;

}

if(m.y>height){

m.y=-200;

}

});

particulas.forEach((p,i)=>{

ctx.fillStyle="rgba(255,255,0,"+p.alpha+")";

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();

p.y+=p.vy;
p.alpha-=0.03;

if(p.alpha<=0){

particulas.splice(i,1);

}

});

for(let i=0;i<20;i++){

ctx.fillStyle="rgba(255,255,255,0.05)";
ctx.fillRect(Math.random()*width,Math.random()*height,2,10);

}

requestAnimationFrame(loop);

}

function finalizarCorrida(){

jogoAtivo=false;

somCorrida.pause();
musicaFundo.pause();

alert("Fim da corrida! Pontos: "+pontos);

location.reload();

}

</script>

</body>
</html>
