<!DOCTYPE html>
<html lang="pt-AO">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiz Menongue Educa</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Fredoka',sans-serif;
background:url("vunongue.png") center/cover no-repeat fixed;
margin:0;
color:white;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(3px);
z-index:-1;
}

.container{
max-width:800px;
margin:40px auto;
padding:30px;
background:rgba(0,0,0,0.8);
border-radius:20px;
text-align:center;
box-shadow:0 0 30px black;
}

h1{
color:#FFD700;
}

input,select,button{

padding:12px;
margin:10px;
border-radius:10px;
border:none;
font-size:16px;

}

button{

background:#ff7f00;
color:white;
font-weight:bold;
cursor:pointer;

}

button:hover{

background:#ff5500;
transform:scale(1.05);

}

#quiz{

display:none;

}

.opcao{

display:block;
background:#3498db;
padding:14px;
margin:10px;
border-radius:10px;
cursor:pointer;

}

.opcao:hover{

background:#1abc9c;

}

.correto{

background:#2ecc71 !important;

}

.incorreto{

background:#e74c3c !important;

}

#progressBar{

height:12px;
background:#444;
border-radius:20px;
margin:20px 0;

}

#progress{

height:12px;
background:#00ff95;
width:0%;

}

</style>

</head>

<body>

<div class="container">

<h1>🎮 Quiz Menongue Educa</h1>

<div id="inicio">

<input id="nome" placeholder="Nome do aluno">

<br>

<select id="nivel">

<option value="facil">Fácil</option>
<option value="dificil">Difícil</option>

</select>

<br>

<button onclick="iniciar()">🚀 Iniciar Quiz</button>

</div>

<div id="quiz">

<div id="timer">⏱ 15</div>

<div id="progressBar">
<div id="progress"></div>
</div>

<h2 id="pergunta"></h2>

<div id="opcoes"></div>

</div>

<div id="resultado"></div>

<div id="ranking"></div>

</div>

<audio id="certo" src="som/certo.mp3"></audio>
<audio id="errado" src="som/errado.mp3"></audio>

<script>

const bancoPerguntas=[

{pergunta:"2 + 2 = ?",opcoes:["3","4","5","6"],correta:1,nivel:"facil"},
{pergunta:"5 + 3 = ?",opcoes:["6","7","8","9"],correta:2,nivel:"facil"},
{pergunta:"10 - 6 = ?",opcoes:["3","4","5","6"],correta:1,nivel:"facil"},
{pergunta:"6 x 3 = ?",opcoes:["12","15","18","20"],correta:2,nivel:"facil"},
{pergunta:"8 + 7 = ?",opcoes:["13","14","15","16"],correta:2,nivel:"facil"},

{pergunta:"12 ÷ 3 = ?",opcoes:["2","3","4","6"],correta:2,nivel:"dificil"},
{pergunta:"9 x 6 = ?",opcoes:["48","54","56","60"],correta:1,nivel:"dificil"},
{pergunta:"25 + 18 = ?",opcoes:["40","41","42","43"],correta:3,nivel:"dificil"}

];

let perguntas=[];
let perguntaAtual=0;
let pontos=0;
let tempo;
let tempoRestante=15;

function iniciar(){

const nivel=document.getElementById("nivel").value;

perguntas=bancoPerguntas.filter(p=>p.nivel==nivel);

perguntas=perguntas.sort(()=>Math.random()-0.5);

document.getElementById("inicio").style.display="none";
document.getElementById("quiz").style.display="block";

mostrarPergunta();
iniciarTimer();

}

function mostrarPergunta(){

if(perguntaAtual>=perguntas.length){

finalizar();
return;

}

const p=perguntas[perguntaAtual];

document.getElementById("pergunta").innerText=p.pergunta;

const opcoes=document.getElementById("opcoes");

opcoes.innerHTML="";

p.opcoes.forEach((op,i)=>{

const btn=document.createElement("div");

btn.className="opcao";

btn.innerText=op;

btn.onclick=()=>responder(i);

opcoes.appendChild(btn);

});

document.getElementById("progress").style.width=(perguntaAtual/perguntas.length*100)+"%";

}

function responder(i){

clearInterval(tempo);

const correta=perguntas[perguntaAtual].correta;

const botoes=document.querySelectorAll(".opcao");

botoes.forEach((b,index)=>{

if(index==correta)b.classList.add("correto");

if(index==i && i!=correta)b.classList.add("incorreto");

});

if(i==correta){

pontos++;

document.getElementById("certo").play();

}else{

document.getElementById("errado").play();

}

setTimeout(()=>{

perguntaAtual++;

mostrarPergunta();
iniciarTimer();

},1000);

}

function iniciarTimer(){

tempoRestante=15;

document.getElementById("timer").innerText="⏱ "+tempoRestante;

tempo=setInterval(()=>{

tempoRestante--;

document.getElementById("timer").innerText="⏱ "+tempoRestante;

if(tempoRestante<=0){

clearInterval(tempo);

perguntaAtual++;

mostrarPergunta();
iniciarTimer();

}

},1000);

}

function finalizar(){

document.getElementById("quiz").style.display="none";

let medalha="🥉";

if(pontos>=6)medalha="🥈";
if(pontos>=7)medalha="🥇";

document.getElementById("resultado").innerHTML=

`<h2>Fim do Jogo</h2>
<h1>${medalha}</h1>
<p>Pontuação: ${pontos}/${perguntas.length}</p>
<button onclick="location.reload()">Jogar novamente</button>`;

salvarRanking();

mostrarRanking();

}

function salvarRanking(){

let r=JSON.parse(localStorage.getItem("ranking"))||[];

r.push({

nome:document.getElementById("nome").value,
pontos:pontos

});

r.sort((a,b)=>b.pontos-a.pontos);

r=r.slice(0,5);

localStorage.setItem("ranking",JSON.stringify(r));

}

function mostrarRanking(){

let r=JSON.parse(localStorage.getItem("ranking"))||[];

let html="<h3>🏆 Ranking</h3><ol>";

r.forEach(x=>{

html+=`<li>${x.nome} - ${x.pontos}</li>`;

});

html+="</ol>";

document.getElementById("ranking").innerHTML=html;

}

</script>

</body>
</html>
