<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎮 Quiz Menongue Educa</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Fredoka',sans-serif;
background:url("vunongue.png") center/cover no-repeat fixed;
margin:0;
color:white;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
backdrop-filter:blur(3px);
z-index:-1;
}

.container{
max-width:850px;
margin:40px auto;
padding:30px;
border-radius:20px;
background:rgba(0,0,0,0.75);
box-shadow:0 0 40px rgba(0,0,0,0.8);
text-align:center;
}

h1{
font-size:2.5rem;
color:#FFD700;
margin-bottom:20px;
}

select,input,button{
padding:12px;
margin:10px;
border-radius:10px;
border:none;
font-size:1rem;
}

button{
background:#ff7f00;
color:white;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#ff5500;
transform:scale(1.05);
}

#quiz{
display:none;
}

#timer{
font-size:1.3rem;
margin-bottom:10px;
}

#progressBar{
height:12px;
background:#444;
border-radius:20px;
margin-bottom:20px;
overflow:hidden;
}

#progress{
height:12px;
width:0%;
background:#00ff95;
transition:.4s;
}

#pergunta{
font-size:1.4rem;
margin:20px 0;
}

.opcao{
display:block;
width:100%;
padding:14px;
margin:8px 0;
background:#3498db;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

.opcao:hover{
background:#1abc9c;
transform:scale(1.03);
}

.correto{
background:#2ecc71 !important;
}

.incorreto{
background:#e74c3c !important;
}

.medalha{
width:120px;
margin:20px;
}

#ranking{
margin-top:20px;
padding:15px;
background:rgba(0,0,0,0.5);
border-radius:15px;
}

</style>
</head>

<body>

<div class="container">

<h1>🎮 Quiz Menongue Educa</h1>

<div id="controls">

<input id="nomeAluno" placeholder="Nome do aluno">

<br>

<select id="classesSelecionadas" multiple>
<option value="1-2">1ª e 2ª Classes</option>
<option value="3-4">3ª e 4ª Classes</option>
<option value="5-6">5ª e 6ª Classes</option>
</select>

<br>

<select id="disciplina">
<option value="">Disciplina</option>
<option value="matematica">Matemática</option>
<option value="portugues">Português</option>
<option value="estudodomeio">Estudo do Meio</option>
<option value="manualplastica">Educação Manual</option>
<option value="educacaofisica">Educação Física</option>
<option value="historia">História</option>
<option value="ciencias">Ciências</option>
<option value="geografia">Geografia</option>
<option value="emc">Educação Moral</option>
<option value="musica">Música</option>
</select>

<br>

<select id="nivel">
<option value="facil">Fácil</option>
<option value="dificil">Difícil</option>
</select>

<br>

<button id="btnIniciar">🚀 Iniciar Quiz</button>

</div>

<div id="quiz">

<div id="timer">⏱ 15</div>

<div id="progressBar">
<div id="progress"></div>
</div>

<h2 id="pergunta"></h2>

<div id="opcoes"></div>

</div>

<div id="resultado"></div>

<div id="ranking"></div>

</div>

<audio id="somCerto" src="som/certo.mp3"></audio>
<audio id="somErrado" src="som/errado.mp3"></audio>

<script>

const arquivosDisciplinas={
matematica:"dados/BancoPerguntaDeMatematica.js",
portugues:"dados/BancoPerguntasPortugues.js",
estudodomeio:"dados/BancoPerguntasEstudoDoMeio.js",
manualplastica:"dados/BancoPerguntasEducacaoPlastica.js",
educacaofisica:"dados/BancoPerguntasEducacaoFisica.js",
historia:"dados/BancoPerguntasHistoria.js",
ciencias:"dados/BancoPerguntasCienciasNatureza.js",
emc:"dados/BancoPerguntasEMC.js",
geografia:"dados/BancoPerguntasGeografia.js",
musica:"dados/BancoPerguntasMusica.js"
};

let perguntas=[];
let perguntaAtual=0;
let pontos=0;
let tempo;
let tempoRestante=15;

const perguntaH3=document.getElementById("pergunta");
const opcoesDiv=document.getElementById("opcoes");
const timerDiv=document.getElementById("timer");
const progress=document.getElementById("progress");

async function carregarPerguntas(disc){

return new Promise((resolve,reject)=>{

const script=document.createElement("script");
script.src=arquivosDisciplinas[disc];

script.onload=()=>{

resolve(window[disc]||[]);

};

document.body.appendChild(script);

});

}

document.getElementById("btnIniciar").onclick=async()=>{

const disciplina=document.getElementById("disciplina").value;

perguntas=await carregarPerguntas(disciplina);

if(perguntas.length===0){

alert("Sem perguntas.");

return;

}

document.getElementById("controls").style.display="none";

document.getElementById("quiz").style.display="block";

perguntaAtual=0;
pontos=0;

mostrarPergunta();
iniciarTimer();

};

function mostrarPergunta(){

if(perguntaAtual>=perguntas.length){

finalizar();

return;

}

const p=perguntas[perguntaAtual];

perguntaH3.innerText=p.pergunta;

opcoesDiv.innerHTML="";

p.opcoes.forEach((op,i)=>{

const btn=document.createElement("div");

btn.className="opcao";

btn.innerText=op;

btn.onclick=()=>responder(i);

opcoesDiv.appendChild(btn);

});

progress.style.width=((perguntaAtual/perguntas.length)*100)+"%";

}

function responder(i){

clearInterval(tempo);

const correta=perguntas[perguntaAtual].correta;

const botoes=document.querySelectorAll(".opcao");

botoes.forEach((b,index)=>{

if(index===correta) b.classList.add("correto");

if(index===i && i!==correta) b.classList.add("incorreto");

});

if(i===correta){

pontos++;

document.getElementById("somCerto").play();

}else{

document.getElementById("somErrado").play();

}

setTimeout(()=>{

perguntaAtual++;

mostrarPergunta();

iniciarTimer();

},1200);

}

function iniciarTimer(){

tempoRestante=15;

timerDiv.innerText="⏱ "+tempoRestante;

tempo=setInterval(()=>{

tempoRestante--;

timerDiv.innerText="⏱ "+tempoRestante;

if(tempoRestante<=0){

clearInterval(tempo);

perguntaAtual++;

mostrarPergunta();

iniciarTimer();

}

},1000);

}

function finalizar(){

document.getElementById("quiz").style.display="none";

let medalha="🥉";

if(pontos>7) medalha="🥇";
else if(pontos>4) medalha="🥈";

document.getElementById("resultado").innerHTML=`

<h2>Fim do Jogo</h2>

<h3>${medalha}</h3>

<p>Pontuação: ${pontos}/${perguntas.length}</p>

<button onclick="location.reload()">Jogar novamente</button>

`;

salvarRanking();

mostrarRanking();

}

function salvarRanking(){

let r=JSON.parse(localStorage.getItem("rankingQuiz"))||[];

r.push({

nome:document.getElementById("nomeAluno").value,

pontos:pontos

});

r.sort((a,b)=>b.pontos-a.pontos);

r=r.slice(0,5);

localStorage.setItem("rankingQuiz",JSON.stringify(r));

}

function mostrarRanking(){

let r=JSON.parse(localStorage.getItem("rankingQuiz"))||[];

let html="<h3>🏆 Ranking</h3><ol>";

r.forEach(x=>{

html+=`<li>${x.nome} - ${x.pontos}</li>`;

});

html+="</ol>";

document.getElementById("ranking").innerHTML=html;

}

</script>

</body>
</html>
