<!DOCTYPE html>
<html lang="pt-AO">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiz Game - Menongue Educa</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{

font-family:'Fredoka',sans-serif;
background:url("vunongue.png") center/cover no-repeat fixed;
margin:0;
color:white;

}

body::before{

content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(3px);
z-index:-1;

}

.container{

max-width:900px;
margin:auto;
padding:30px;
text-align:center;

}

h1{

color:#FFD700;
font-size:2.5rem;
text-shadow:2px 2px 8px black;

}

.card{

background:rgba(0,0,0,0.85);
padding:25px;
border-radius:20px;
box-shadow:0 0 30px rgba(0,0,0,0.8);

}

select,input,button{

padding:12px 15px;
margin:10px;
border:none;
border-radius:10px;
font-size:16px;

}

input,select{

width:230px;

}

button{

background:#ff7f00;
color:white;
font-weight:bold;
cursor:pointer;
transition:.3s;

}

button:hover{

transform:scale(1.05);
background:#ff5500;

}

#quiz{

display:none;

}

#timer{

font-size:20px;
margin-bottom:10px;

}

#pergunta{

font-size:22px;
margin:20px 0;

}

.opcao{

display:block;
background:#3498db;
margin:10px;
padding:14px;
border-radius:12px;
cursor:pointer;
font-size:18px;
transition:.3s;

}

.opcao:hover{

background:#1abc9c;
transform:scale(1.03);

}

.correto{

background:#2ecc71 !important;

}

.incorreto{

background:#e74c3c !important;

}

#progressBar{

height:12px;
background:#444;
border-radius:20px;
margin:15px 0;

}

#progress{

height:12px;
background:#00ff95;
width:0%;

}

.medalha{

width:120px;

}

#ranking{

margin-top:20px;

}

</style>

</head>

<body>

<div class="container">

<h1>🎮 Quiz Menongue Educa</h1>

<div class="card" id="controls">

<input id="nomeAluno" placeholder="Nome do aluno">

<br>

<select id="classesSelecionadas" multiple>

<option value="1-2">1ª e 2ª Classe</option>
<option value="3-4">3ª e 4ª Classe</option>
<option value="5-6">5ª e 6ª Classe</option>

</select>

<br>

<select id="disciplina"></select>

<select id="nivel">

<option value="facil">Fácil</option>
<option value="dificil">Difícil</option>

</select>

<br>

<button id="btnIniciar">🚀 Iniciar Quiz</button>

</div>

<div class="card" id="quiz">

<div id="timer"></div>

<div id="progressBar">
<div id="progress"></div>
</div>

<h2 id="pergunta"></h2>

<div id="opcoes"></div>

</div>

<div id="resultado"></div>

<div id="ranking"></div>

</div>

<audio id="somCerto" src="som/certo.mp3"></audio>
<audio id="somErrado" src="som/errado.mp3"></audio>

<script>

const disciplinas={

matematica:"dados/BancoPerguntaDeMatematica.js",
portugues:"dados/BancoPerguntasPortugues.js",
estudodomeio:"dados/BancoPerguntasEstudoDoMeio.js",
manualplastica:"dados/BancoPerguntasEducacaoPlastica.js",
educacaofisica:"dados/BancoPerguntasEducacaoFisica.js",
historia:"dados/BancoPerguntasHistoria.js",
ciencias:"dados/BancoPerguntasCienciasNatureza.js",
emc:"dados/BancoPerguntasEMC.js",
geografia:"dados/BancoPerguntasGeografia.js",
musica:"dados/BancoPerguntasMusica.js"

}

const disciplinaSelect=document.getElementById("disciplina")

for(let d in disciplinas){

let opt=document.createElement("option")

opt.value=d
opt.textContent=d.toUpperCase()

disciplinaSelect.appendChild(opt)

}

let perguntas=[]
let perguntaAtual=0
let pontos=0
let tempo
let tempoRestante=15

async function carregarPerguntas(d){

return new Promise((resolve,reject)=>{

let script=document.createElement("script")

script.src=disciplinas[d]

script.onload=()=>{

resolve(window[d] || [])

}

script.onerror=()=>reject("Erro ao carregar")

document.body.appendChild(script)

})

}

document.getElementById("btnIniciar").onclick=async()=>{

let nome=document.getElementById("nomeAluno").value

if(!nome){

alert("Digite o nome")
return

}

let disc=disciplinaSelect.value

let nivel=document.getElementById("nivel").value

let todas=await carregarPerguntas(disc)

perguntas=todas.filter(p=>p.nivel===nivel)

if(perguntas.length===0){

alert("Sem perguntas para esta seleção")

return

}

perguntas=perguntas.sort(()=>Math.random()-0.5)

document.getElementById("controls").style.display="none"

document.getElementById("quiz").style.display="block"

mostrarPergunta()

iniciarTimer()

}

function mostrarPergunta(){

if(perguntaAtual>=perguntas.length){

finalizar()

return

}

let p=perguntas[perguntaAtual]

document.getElementById("pergunta").innerText=p.pergunta

let opcoesDiv=document.getElementById("opcoes")

opcoesDiv.innerHTML=""

p.opcoes.forEach((op,i)=>{

let btn=document.createElement("div")

btn.className="opcao"

btn.innerText=op

btn.onclick=()=>responder(i)

opcoesDiv.appendChild(btn)

})

document.getElementById("progress").style.width=(perguntaAtual/perguntas.length*100)+"%"

}

function responder(i){

clearInterval(tempo)

let correta=perguntas[perguntaAtual].correta

let botoes=document.querySelectorAll(".opcao")

botoes.forEach((b,index)=>{

if(index===correta) b.classList.add("correto")

if(index===i && i!==correta) b.classList.add("incorreto")

})

if(i===correta){

pontos++

document.getElementById("somCerto").play()

}else{

document.getElementById("somErrado").play()

}

setTimeout(()=>{

perguntaAtual++

mostrarPergunta()

iniciarTimer()

},1000)

}

function iniciarTimer(){

tempoRestante=15

document.getElementById("timer").innerText="⏱ "+tempoRestante

tempo=setInterval(()=>{

tempoRestante--

document.getElementById("timer").innerText="⏱ "+tempoRestante

if(tempoRestante<=0){

clearInterval(tempo)

perguntaAtual++

mostrarPergunta()

iniciarTimer()

}

},1000)

}

function finalizar(){

document.getElementById("quiz").style.display="none"

let medalha="imagens/medalhas/bronze.png"

if(pontos>=7) medalha="imagens/medalhas/prata.png"

if(pontos>=9) medalha="imagens/medalhas/ouro.png"

document.getElementById("resultado").innerHTML=

`<h2>🏁 Fim do Jogo</h2>
<img src="${medalha}" class="medalha">
<p>Pontuação ${pontos}/${perguntas.length}</p>
<button onclick="location.reload()">Jogar novamente</button>`

salvarRanking()

mostrarRanking()

}

function salvarRanking(){

let ranking=JSON.parse(localStorage.getItem("ranking"))||[]

ranking.push({

nome:document.getElementById("nomeAluno").value,
pontos:pontos

})

ranking.sort((a,b)=>b.pontos-a.pontos)

ranking=ranking.slice(0,5)

localStorage.setItem("ranking",JSON.stringify(ranking))

}

function mostrarRanking(){

let ranking=JSON.parse(localStorage.getItem("ranking"))||[]

let html="<h3>🏆 Ranking</h3><ol>"

ranking.forEach(r=>{

html+=`<li>${r.nome} - ${r.pontos}</li>`

})

html+="</ol>"

document.getElementById("ranking").innerHTML=html

}

</script>

</body>
</html>
